blueprint:
  name: "R&D: DTT Reward — Activate Scene on Pass"
  description: >
    Activate a reward scene when a DTT session is passed.
    Use this to set mood lighting, play music, unlock devices,
    or trigger any other scene as a reward for a successful session.
  domain: automation
  input:
    session_event_entity:
      name: Session Completed Event
      description: The DTT "Session Completed" event entity
      selector:
        entity:
          filter:
            - integration: research_and_desire
              domain: event
    reward_scene:
      name: Reward Scene
      description: The scene to activate when a session is passed
      selector:
        entity:
          filter:
            - domain: scene

trigger:
  - trigger: state
    entity_id: !input session_event_entity
    attribute: event_type
    to: "session_passed"

action:
  - action: scene.turn_on
    target:
      entity_id: !input reward_scene
