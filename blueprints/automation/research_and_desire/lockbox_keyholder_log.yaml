blueprint:
  name: "R&D: Lockbox Keyholder Activity Log"
  description: >
    Send all Lockbox state changes to a keyholder's notification service.
    Includes timestamp, previous state, new state, and the name of the
    active lock for full visibility and control.
  domain: automation
  input:
    lock_status_entity:
      name: Lock Status Sensor
      description: The Lockbox "Lock Status" sensor
      selector:
        entity:
          filter:
            - integration: research_and_desire
              domain: sensor
    active_lock_entity:
      name: Active Lock Sensor
      description: The Lockbox "Active Lock" or template name sensor
      selector:
        entity:
          filter:
            - integration: research_and_desire
              domain: sensor
    keyholder_notify_service:
      name: Keyholder Notification Service
      description: The notify service for the keyholder
      default: notify.notify
      selector:
        text:

trigger:
  - trigger: state
    entity_id: !input lock_status_entity

condition:
  - condition: template
    value_template: >
      {{ trigger.from_state.state != trigger.to_state.state
         and trigger.to_state.state not in ['unavailable', 'unknown'] }}

action:
  - variables:
      old_state: "{{ trigger.from_state.state }}"
      new_state: "{{ trigger.to_state.state }}"
      timestamp: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      active_lock: "{{ states(lock_entity) }}"
      lock_entity: !input active_lock_entity
  - action: !input keyholder_notify_service
    data:
      title: "Lockbox Activity Log"
      message: >
        [{{ timestamp }}]
        State: {{ old_state }} → {{ new_state }}
        Active Lock: {{ active_lock }}
