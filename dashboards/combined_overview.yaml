###############################################################################
# R&D Combined Overview Dashboard (Sections Layout)
#
# Shows all Research and Desire devices at a glance: DTT + Lockbox + OSSM
#
# How to use:
# 1. Go to Settings > Dashboards > Add Dashboard
# 2. Give it a name (e.g. "R&D Overview") and select "Start with empty dashboard"
# 3. Click the three dots (top right) > "Raw configuration editor"
# 4. Paste this entire YAML and save
#
# Note: Entity IDs may differ — adjust to match your setup.
###############################################################################

views:
  - title: R&D Overview
    icon: mdi:heart-pulse
    type: sections
    max_columns: 3
    sections:
      # =====================================================================
      # COLUMN 1 — Deepthroat Trainer
      # =====================================================================

      - type: grid
        cards:
          - type: heading
            heading: Deepthroat Trainer
            icon: mdi:dumbbell
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.deepthroat_trainer_latest_session_status
                name: Status
              - type: entity
                entity: sensor.deepthroat_trainer_latest_session_grade
                name: Grade
              - type: entity
                entity: sensor.deepthroat_trainer_latest_session_points
                name: Points

          # --- Gauges ---
          - type: gauge
            entity: sensor.deepthroat_trainer_latest_session_grade
            name: Session Grade
            min: 0
            max: 100
            severity:
              green: 80
              yellow: 60
              red: 0
            needle: true
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.deepthroat_trainer_segment_pass_rate
                name: Pass Rate
                min: 0
                max: 100
                severity:
                  green: 80
                  yellow: 50
                  red: 0
                needle: true
              - type: gauge
                entity: sensor.deepthroat_trainer_best_segment_grade
                name: Best Grade
                min: 0
                max: 100
                severity:
                  green: 80
                  yellow: 60
                  red: 0
                needle: true

          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.deepthroat_trainer_active_template
                name: Template
              - type: entity
                entity: sensor.deepthroat_trainer_last_seen
                name: Last Seen

          # --- DTT History ---
          - type: history-graph
            title: Grade & Pass Rate
            hours_to_show: 168
            entities:
              - entity: sensor.deepthroat_trainer_latest_session_grade
                name: Grade
              - entity: sensor.deepthroat_trainer_segment_pass_rate
                name: Pass Rate
          - type: history-graph
            title: Points & Reps
            hours_to_show: 168
            entities:
              - entity: sensor.deepthroat_trainer_latest_session_points
                name: Points
              - entity: sensor.deepthroat_trainer_session_total_reps
                name: Reps

      # =====================================================================
      # COLUMN 2 — Lockbox
      # =====================================================================

      - type: grid
        cards:
          - type: heading
            heading: Lockbox
            icon: mdi:lock
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.lockbox_lock_status
                name: Status
                icon: mdi:lock
              - type: entity
                entity: sensor.lockbox_active_lock
                name: Active Lock
              - type: entity
                entity: sensor.lockbox_lock_duration
                name: Duration
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.lockbox_lock_state
                name: Lock State
                icon: mdi:lock-clock
              - type: entity
                entity: sensor.lockbox_time_remaining
                name: Remaining
                icon: mdi:timer-sand

          # --- Lockbox Gauge ---
          - type: gauge
            entity: sensor.lockbox_time_remaining
            name: Time Remaining
            min: 0
            max: 86400
            severity:
              green: 0
              yellow: 21600
              red: 43200
            needle: true

          - type: entities
            entities:
              - entity: sensor.lockbox_breaks_enabled
                name: Breaks
              - entity: sensor.lockbox_deepthroat_enabled
                name: DTT Integration
              - entity: sensor.lockbox_shame_enabled
                name: Shame Mode
              - entity: sensor.lockbox_last_seen
                name: Last Seen

          # --- Lockbox History ---
          - type: history-graph
            title: Lock Status
            hours_to_show: 168
            entities:
              - entity: sensor.lockbox_lock_status
                name: Status
              - entity: sensor.lockbox_lock_state
                name: Lock State
          - type: history-graph
            title: Time Remaining
            hours_to_show: 168
            entities:
              - entity: sensor.lockbox_time_remaining
                name: Remaining

      # =====================================================================
      # COLUMN 3 — OSSM & Device Status
      # =====================================================================

      - type: grid
        cards:
          - type: heading
            heading: OSSM
            icon: mdi:engine
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.ossm_session_count
                name: Sessions
                icon: mdi:counter
              - type: entity
                entity: sensor.ossm_pattern_count
                name: Patterns
                icon: mdi:wave
          - type: entities
            entities:
              - entity: sensor.ossm_firmware_version
                name: Firmware
              - entity: sensor.ossm_last_seen
                name: Last Seen

          # --- Device Status ---
          - type: heading
            heading: All Devices
            icon: mdi:information
          - type: entities
            entities:
              - entity: sensor.deepthroat_trainer_last_seen
                name: DTT Last Seen
              - entity: sensor.lockbox_last_seen
                name: Lockbox Last Seen
              - entity: sensor.ossm_last_seen
                name: OSSM Last Seen

          # --- Combined Activity ---
          - type: heading
            heading: Activity
            icon: mdi:chart-line
          - type: history-graph
            title: Speed & Performance
            hours_to_show: 168
            entities:
              - entity: sensor.deepthroat_trainer_avg_speed
                name: Avg Speed
              - entity: sensor.deepthroat_trainer_max_speed
                name: Max Speed
          - type: history-graph
            title: Session Duration
            hours_to_show: 168
            entities:
              - entity: sensor.deepthroat_trainer_latest_session_duration
                name: DTT Duration
