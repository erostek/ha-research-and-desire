###############################################################################
# DTT Training Dashboard
#
# How to use:
# 1. Go to Settings > Dashboards > Add Dashboard
# 2. Give it a name (e.g. "DTT Training") and select "Start with empty dashboard"
# 3. Click the three dots (top right) > "Raw configuration editor"
# 4. Paste this entire YAML and save
#
# Note: Entity IDs may differ — adjust to match your setup.
# Find your entity IDs at Settings > Devices > Deepthroat Trainer
###############################################################################

views:
  - title: DTT Training
    icon: mdi:dumbbell
    cards:
      # --- Header ---
      - type: markdown
        content: |
          # Deepthroat Trainer
          Real-time training data from Research and Desire

      # --- Session Status Row ---
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.deepthroat_trainer_latest_session_status
            name: Status
            icon: mdi:check-circle
          - type: entity
            entity: sensor.deepthroat_trainer_latest_session_grade
            name: Grade
            icon: mdi:percent
          - type: entity
            entity: sensor.deepthroat_trainer_latest_session_points
            name: Points
            icon: mdi:star

      # --- Session Detail Cards ---
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.deepthroat_trainer_latest_session_date
            name: Date
            icon: mdi:calendar
          - type: entity
            entity: sensor.deepthroat_trainer_latest_session_duration
            name: Duration
            icon: mdi:timer
          - type: entity
            entity: sensor.deepthroat_trainer_latest_session_segments
            name: Segments
            icon: mdi:segment

      # --- Grade Gauge ---
      - type: gauge
        entity: sensor.deepthroat_trainer_latest_session_grade
        name: Session Grade
        min: 0
        max: 100
        severity:
          green: 80
          yellow: 60
          red: 0
        needle: true

      # --- Segment Analysis ---
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.deepthroat_trainer_best_segment_grade
            name: Best Grade
            icon: mdi:arrow-up-bold
          - type: entity
            entity: sensor.deepthroat_trainer_worst_segment_grade
            name: Worst Grade
            icon: mdi:arrow-down-bold
          - type: entity
            entity: sensor.deepthroat_trainer_segment_pass_rate
            name: Pass Rate
            icon: mdi:chart-donut

      # --- Performance Metrics ---
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.deepthroat_trainer_session_total_reps
            name: Total Reps
            icon: mdi:repeat
          - type: entity
            entity: sensor.deepthroat_trainer_avg_speed
            name: Avg Speed
            icon: mdi:speedometer
          - type: entity
            entity: sensor.deepthroat_trainer_longest_deepthroat
            name: Longest DT
            icon: mdi:arrow-expand-vertical

      # --- Active Template ---
      - type: entities
        title: Active Template
        icon: mdi:file-document
        entities:
          - entity: sensor.deepthroat_trainer_active_template
            name: Template
          - entity: sensor.deepthroat_trainer_template_message
            name: Message
          - entity: sensor.deepthroat_trainer_template_tagline
            name: Tagline
          - entity: sensor.deepthroat_trainer_toy_tagline
            name: Toy Tagline
          - entity: sensor.deepthroat_trainer_target_depth
            name: Target Depth
          - entity: sensor.deepthroat_trainer_target_window
            name: Target Window
          - entity: sensor.deepthroat_trainer_hands_free_mode
            name: Hands-Free
          - entity: sensor.deepthroat_trainer_template_segments
            name: Template Segments

      # --- Device Info ---
      - type: entities
        title: Device
        icon: mdi:information
        entities:
          - entity: sensor.deepthroat_trainer_serial_number
            name: Serial Number
          - entity: sensor.deepthroat_trainer_software_version
            name: Firmware
          - entity: sensor.deepthroat_trainer_last_seen
            name: Last Seen
          - entity: sensor.deepthroat_trainer_last_log
            name: Last Log

      # --- Session History (if you have recorder enabled) ---
      - type: history-graph
        title: Grade History
        hours_to_show: 168
        entities:
          - entity: sensor.deepthroat_trainer_latest_session_grade
            name: Grade
