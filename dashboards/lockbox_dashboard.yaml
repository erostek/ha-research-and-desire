###############################################################################
# Lockbox Dashboard
#
# How to use:
# 1. Go to Settings > Dashboards > Add Dashboard
# 2. Give it a name (e.g. "Lockbox") and select "Start with empty dashboard"
# 3. Click the three dots (top right) > "Raw configuration editor"
# 4. Paste this entire YAML and save
#
# Note: Entity IDs may differ — adjust to match your setup.
# Find your entity IDs at Settings > Devices > Lockbox
###############################################################################

views:
  - title: Lockbox
    icon: mdi:lock
    cards:
      # --- Lock Status Banner ---
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.lockbox_lock_status
            state: "Locked"
        card:
          type: markdown
          content: |
            # 🔒 LOCKED
          style: |
            ha-card { background-color: #b71c1c; color: white; text-align: center; }

      - type: conditional
        conditions:
          - condition: state
            entity: sensor.lockbox_lock_status
            state: "Unlocked"
        card:
          type: markdown
          content: |
            # 🔓 UNLOCKED
          style: |
            ha-card { background-color: #1b5e20; color: white; text-align: center; }

      # --- Controls ---
      - type: entities
        title: Controls
        icon: mdi:tune
        entities:
          - entity: lock.lockbox_lock
            name: Lock
          - entity: select.lockbox_lock_template
            name: Lock Template
          - entity: number.lockbox_lock_duration
            name: Duration (modify)

      # --- Lock Status Entity ---
      - type: entity
        entity: sensor.lockbox_lock_status
        name: Lock Status
        icon: mdi:lock

      # --- Active Lock Info ---
      - type: entities
        title: Active Lock
        icon: mdi:lock-clock
        entities:
          - entity: sensor.lockbox_active_lock
            name: Lock Template
          - entity: sensor.lockbox_lock_duration
            name: Duration
          - entity: sensor.lockbox_min_lock_duration
            name: Min Duration
          - entity: sensor.lockbox_max_lock_duration
            name: Max Duration
          - entity: sensor.lockbox_random_duration
            name: Random Duration

      # --- Lock Session ---
      - type: entities
        title: Lock Session
        icon: mdi:timer-sand
        entities:
          - entity: sensor.lockbox_lock_state
            name: State
          - entity: sensor.lockbox_lock_start_time
            name: Started
          - entity: sensor.lockbox_lock_end_time
            name: Ends
          - entity: sensor.lockbox_time_remaining
            name: Time Remaining

      # --- Lock Settings ---
      - type: entities
        title: Lock Settings
        icon: mdi:cog
        entities:
          - entity: sensor.lockbox_breaks_enabled
            name: Breaks
          - entity: sensor.lockbox_break_regularity
            name: Break Every
          - entity: sensor.lockbox_max_break_duration
            name: Max Break
          - entity: sensor.lockbox_break_penalty
            name: Break Penalty
          - entity: sensor.lockbox_keyholder_only_breaks
            name: Keyholder-Only Breaks
          - entity: sensor.lockbox_emergency_unlock
            name: Emergency Unlock
          - entity: sensor.lockbox_time_displayed
            name: Time Displayed

      # --- Integration Features ---
      - type: entities
        title: Features
        icon: mdi:feature-search
        entities:
          - entity: sensor.lockbox_deepthroat_enabled
            name: DTT Integration
          - entity: sensor.lockbox_dtt_time_reduction
            name: DTT Time Reduction
          - entity: sensor.lockbox_shame_enabled
            name: Shame Mode
          - entity: sensor.lockbox_shame_time_penalty
            name: Shame Time Penalty
          - entity: sensor.lockbox_publicly_listed
            name: Publicly Listed
          - entity: sensor.lockbox_test_lock
            name: Test Lock

      # --- Device Info ---
      - type: entities
        title: Device
        icon: mdi:information
        entities:
          - entity: sensor.lockbox_mac_address
            name: MAC Address
          - entity: sensor.lockbox_last_seen
            name: Last Seen
          - entity: sensor.lockbox_template_count
            name: Templates
          - entity: sensor.lockbox_session_count
            name: Sessions
